params:
  title: "The Hedge Engineer"
  description: Everything Geotechnical, Finance, DataViz, and Tech!
  # staticPath: ""  # The path to serve the static files from
  favicon: "/EA-logo.svg"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Uncomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether to add mathjax support on all pages. Alternatively, you can opt-in per page by adding `mathjax: true` in the frontmatter.
  mathjax: false

  # Whether the fade animations on the home page will be enabled
  animate: true

  theme:
    # disableThemeToggle: true
    # defaultTheme: "light" # dark

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # When using hex codes for colors, quotations must be used along with the # sign
  color:
    textColor: "#343a40"
    secondaryTextColor: "#6c757d"
    textLinkColor: "#007bff"
    backgroundColor: "#eaedf0"
    secondaryBackgroundColor: "#64ffda1a"
    primaryColor: "#007bff"
    secondaryColor: "#f8f9fa"

    darkmode:
      textColor: "#e4e6eb"
      secondaryTextColor: "#b0b3b8"
      textLinkColor: "#007bff" #"#ffffff"
      backgroundColor: "#18191a"
      secondaryBackgroundColor: "#212529"
      primaryColor: "#ffffff"
      secondaryColor: "#212529"

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    # brandLogo: "/logo.png" # Logo for the brand | default is the favicon variable
    # showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "The Hedge Engineer" # Brand name for the brand | default is the title variable
    disableSearch: false
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Enrico Luis Abcede."
    subtitle: "I'm a Geotechnical-Earthquake Engineer and Finance Bro"
    content: > 
      I'm passionate about soil, seismology, and how structures respond to earthquakes and design for its resilience. 
      I use numbers and DataViz to solve complex problems. I'm also a student of the Sage of Omaha, looking for the best bargain price of a stock.
    image: /images/profile-pic.jpg
    bottomImage:
      enable: true
    # roundImage: true # Make hero image circular | default false
    button:
      enable: true
      name: "Resume"
      url: "#"
      download: true
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/emabcede30
        - icon: fab fa-linkedin
          url: https://www.linkedin.com/in/elma30/
      customIcons:
        - icon: /EA-logo.svg
          url: "https://the-hedge-engineer.netlify.app/"

  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/portrait-pic.jpg"
    content: >
      I am currently working on a project that will be used to help people find the best way to get around the city.
      I am a Registered Civil Engineer with a focus on geotechnical earthquake engineering, seismic hazard and risk analysis, deep foundation design, and slope stability. 
      Throughout my career here in the Philippines, I have led infrastructure projects aggregate worth over ₱25M (+$400k), ensuring that buildings and bridges are built safely on challenging ground. 
      Outside of engineering, I actively manage a personal investment portfolio of stocks and bonds across the Philippines and US markets, utilizing strategies to hedge against inflation. 

      I am currently working as a Design Engineer at [AMH Philippines, Inc.](https://amhphil.com/) in Quezon City, Metro Manila, PH. 
      
    skills:
      enable: true
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "Python"
        - "Openquake"
        - "Opensees"
        - "RSPile"
        - "Slide2D"
        - "Civil3D"

  # Experience
  experience:
    enable: true
    # title: "Custom Name"
    items:
      - company: "AMH Philippines, Inc."
        companyUrl: "https://amhphil.com/"
        jobs:
          - name: "Design Engineer"
